<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | Your Business Name</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <nav>
        <h1>Contact</h1>
        <div class="hamburger" onclick="toggleMenu()">■</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a> </li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <main class="form-page">

        <h1>Contact Us</h1>

        <p>Fill out the form below and we will get back to you within 24 hours.</p>

        <form id="contactForm" action="#" method="post" novalidate>


            <!-- Full Name -->

            <div class="form-group">

                <label for="fullName">Full Name <span class="required">*</span></label>

                <input type="text" id="fullName" name="fullName" placeholder="Jane Smith" autocomplete="name" required>

                <span class="error-msg" id="fullNameError"></span>

            </div>
            <!-- Email -->

            <div class="form-group">

                <label for="email">Email Address <span class="required">*</span></label>

                <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email"
                    required>

                <span class="error-msg" id="emailError"></span>

            </div>
            <!-- Phone -->

            <div class="form-group">

                <label for="phone">Phone Number</label>

                <input type="tel" id="phone" name="phone" placeholder="(208) 555-0100" autocomplete="tel">

                <span class="error-msg" id="phoneError"></span>
                <!-- Reason for contact -->

                <div class="form-group">

                    <label for="reason">Reason for Contact <span class="required">*</span></label>

                    <select id="reason" name="reason" required>

                        <option value="">-- Please select --</option>

                        <option value="general">General Inquiry</option>

                        <option value="support">Customer Support</option>

                        <option value="sales">Sales Question</option>

                        <option value="feedback">Feedback</option>

                        <option value="other">Other</option>

                    </select>

                    <span class="error-msg" id="reasonError"></span>

                </div>
            </div>
            <!-- Preferred contact method -->

            <fieldset class="form-group">

                <legend>Preferred Contact Method <span class="required">*</span></legend>

                <div class="radio-group">

                    <input type="radio" id="contactEmail" name="contactMethod" value="email" required>

                    <label for="contactEmail">Email</label>

                </div>

                <div class="radio-group">

                    <input type="radio" id="contactPhone" name="contactMethod" value="phone">

                    <label for="contactPhone">Phone</label>

                </div>

                <div class="radio-group">

                    <input type="radio" id="contactEither" name="contactMethod" value="either">

                    <label for="contactEither">Either is fine</label>

                </div>

                <span class="error-msg" id="contactMethodError"></span>
            </fieldset>
    </main>

    <footer>
        <p>Look at this awesome footer</p>
    </footer>

    <script src="js/formValidation.js"></script>

</body>

</html>
